<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-translate="page_title">Pokédex Hub</title>
    <link rel="icon" type="image/x-icon" href="resources/favicon.ico">
    <link rel="stylesheet" href="css/styles_main.css">
    <link rel="stylesheet" href="css/styles_FullPokedex.css">
    <link rel="stylesheet" href="css/styles_index.css">
</head>
<body>
    <div id="navbar-placeholder"></div>

    <div class="hub-hero">
        <img alt="Pokémon Luck" src="resources/logo.png" class="hub-logo">
    </div>

    <div class="container hub-container">
        <h1 data-translate="welcome_message"></h1>
        <p data-translate="hub_description" class="hub-muted"></p>
        <br>
        <h1 data-translate="game_contents"></h1>
        <div class="hub-card">
            <h2 data-translate="fakemon"></h2>
            <p data-translate="fakemon_description" class="hub-muted"></p>
        </div>
        <div class="hub-card">
            <div class="hub-card-header">
                <h2 data-translate="undead_type"></h2>
                <img id="undead_icon" class="hub-type-icon" src="resources/icons/types/undead_fr.png"/>
            </div>
            <p data-translate="undead_type_description" class="hub-muted"></p>
        </div>
        <div class="hub-card">
            <div class="hub-card-header">
                <h2 data-translate="celestial_type"></h2>
                <img id="celestial_icon" class="hub-type-icon" src="resources/icons/types/celestial_fr.png"/>
            </div>
            <p data-translate="celestial_type_description" class="hub-muted"></p>
        </div>
        <div class="hub-card">
            <div class="hub-card-header">
                <h2 data-translate="decay"></h2>
                <img id="decay_icon" class="hub-decay-icon" src="resources/icons/decay_fr.png"/>
            </div>
            <p data-translate="decay_description" class="hub-muted"></p>
        </div>
        <div class="hub-card">
            <div class="hub-card-header">
                <h2 data-translate="blessed_terrain"></h2>
            </div>
            <p data-translate="blessed_terrain_description" class="hub-muted"></p>
        </div>
        <div class="hub-card">
            <h2 data-translate="open_world"></h2>
            <p data-translate="open_world_description" class="hub-muted"></p>
            <img src="resources/LaemuMap.png" class="hub-map">
        </div>
        <div class="hub-card">
            <h2 data-translate="scaling"></h2>
            <p data-translate="scaling_description" class="hub-muted"></p>
        </div>
        <br>
        <h1 data-translate="starters"></h1>
        <p data-translate="starters_description" class="hub-muted"></p>
        <div id="pokedexGrid" class="grid-container hub-grid"></div>
    </div>

    <script src="js/PokemonUtils.js"></script>
    <script src="js/LanguageManager.js"></script>
    <script src="js/LoadNavbar.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const lang = PokemonUtils.getLang(languageManager);

            const undeadIcon = document.getElementById('undead_icon');
            undeadIcon.src = `resources/icons/types/undead_${lang}.png`

            const decayIcon = document.getElementById('decay_icon');
            decayIcon.src = `resources/icons/decay_${lang}.png`
            
            const pokedexGrid = document.getElementById('pokedexGrid');

            // Toutes les données nécessaires (nom + types) sont dans national.json :
            // pas besoin de charger une fiche consolidée par starter.
            const starterSymbols = ['marmousse', 'tremplume', 'cramin'];

            PokemonUtils.fetchJson('data/national.json')
                .then(data => {
                    const bySymbol = new Map(data.creatures.map(c => [c.dbSymbol, c]));
                    const fragment = document.createDocumentFragment();

                    starterSymbols.forEach(symbol => {
                        const creature = bySymbol.get(symbol);
                        if (!creature) return;

                        const pokemonCard = document.createElement('div');
                        pokemonCard.classList.add('pokemon-card');

                        const pokemonSprite = document.createElement('img');
                        pokemonSprite.src = `data/pokefront/${symbol}.png`;
                        pokemonSprite.alt = symbol;
                        pokemonSprite.classList.add('pokemon-sprite');
                        pokemonSprite.loading = 'lazy';
                        pokemonSprite.decoding = 'async';

                        const pokemonName = document.createElement('p');
                        pokemonName.textContent = creature.names[lang];
                        pokemonName.classList.add('pokemon-name');

                        pokemonCard.appendChild(pokemonSprite);
                        pokemonCard.appendChild(pokemonName);
                        pokemonCard.appendChild(document.createElement('br'));

                        const type1French = creature.type1
                            ? PokemonUtils.removeAccents(PokemonUtils.translateTypeToFrench(creature.type1))
                            : null;
                        const type2French = creature.type2 && creature.type2 !== "__undef__"
                            ? PokemonUtils.removeAccents(PokemonUtils.translateTypeToFrench(creature.type2))
                            : null;

                        if (type1French) {
                            pokemonCard.classList.add(type1French);

                            const typesDiv = document.createElement('div');
                            typesDiv.style.cssText = 'display:flex;justify-content:center;gap:10px;';

                            const type1Image = document.createElement('img');
                            type1Image.src = `resources/icons/types/${type1French}.png`;
                            type1Image.style.cssText = 'width:50px;';
                            typesDiv.appendChild(type1Image);

                            if (type2French) {
                                const type2Image = document.createElement('img');
                                type2Image.src = `resources/icons/types/${type2French}.png`;
                                type2Image.style.cssText = 'width:50px;';
                                typesDiv.appendChild(type2Image);
                            }

                            pokemonCard.appendChild(typesDiv);
                        }

                        // Make the card clickable
                        pokemonCard.addEventListener('click', () => {
                            window.location.href = `PokemonSearch.html?pokemon=${symbol}`;
                        });

                        fragment.appendChild(pokemonCard);
                    });

                    pokedexGrid.appendChild(fragment);
                })
                .catch(error => {
                    console.error('Error loading full Pokédex:', error);
                    pokedexGrid.innerHTML = '<p>Failed to load Pokémon data. Please try again later.</p>';
                });
        });
    </script>
</body>
</html>
